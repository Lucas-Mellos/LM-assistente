<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>LM - Assistente</title>
  <style>
    body { font-family: Arial, Helvetica, sans-serif; margin: 0; background: #f3f4f6; color: #111827; }
    header { background: #1f2937; color: #fff; padding: 14px 18px; display: flex; justify-content: space-between; align-items: center; }
    main { padding: 14px; }
    .tabs { display: flex; gap: 10px; margin-bottom: 12px; }
    .tab-btn { padding: 10px 14px; border: none; background: #d1d5db; cursor: pointer; border-radius: 6px; font-weight: bold; }
    .tab-btn.active { background: #1f2937; color: #fff; }
    .tab-content { display: none; }
    .tab-content.active { display: block; }
    input, textarea { width: 100%; padding: 10px; margin-bottom: 10px; border: 1px solid #9ca3af; border-radius: 6px; box-sizing: border-box; font-size: 14px; }
    textarea { min-height: 90px; resize: vertical; }
    button { padding: 10px 14px; margin-right: 6px; margin-bottom: 6px; cursor: pointer; border: none; border-radius: 6px; background: #1f2937; color: white; }
    button.sec { background: #6b7280; }
    .card { background: #fff; padding: 14px; margin-bottom: 12px; border-radius: 10px; border: 1px solid #cbd5e1; }
    .qa-item { border: 1px solid #d1d5db; padding: 12px; border-radius: 8px; margin-bottom: 10px; background: #f9fafb; }
    .qa-top { display: flex; justify-content: space-between; gap: 10px; align-items: flex-start; }
    .qa-actions button { padding: 7px 10px; font-size: 13px; }
    .muted { color: #6b7280; font-size: 13px; }
    .status { padding: 10px 12px; background: #eef2ff; border: 1px solid #c7d2fe; border-radius: 8px; margin-top: 10px; }
    .resposta-box { min-height: 100px; border: 1px solid #d1d5db; border-radius: 8px; padding: 12px; background: #f9fafb; }
    @media (max-width: 700px) {
      header { flex-direction: column; align-items: flex-start; gap: 8px; }
      .qa-top { flex-direction: column; }
    }
  </style>
</head>
<body>

<header>
  <div><strong>LM - Assistente</strong></div>
  <div><strong>LUCAS MELLOS</strong> (51)980477828</div>
</header>

<main>
  <div class="tabs">
    <button class="tab-btn active" data-tab="cadastro">Cadastro</button>
    <button class="tab-btn" data-tab="assistente">Assistente</button>
  </div>

  <div id="cadastro" class="tab-content active">
    <div class="card">
      <h3>Nova Pergunta</h3>
      <input id="pergunta" placeholder="Digite a pergunta" />
      <textarea id="resposta" placeholder="Digite a resposta"></textarea>
      <button onclick="salvarItem()">Salvar</button>
      <button class="sec" onclick="limparCampos()">Limpar</button>
      <button class="sec" onclick="exportarJSON()">Exportar JSON</button>
      <input type="file" id="importar" hidden accept=".json" />
      <button class="sec" onclick="document.getElementById('importar').click()">Importar JSON</button>
      <div id="statusCadastro" class="status">Sistema pronto.</div>
      <div class="muted" style="margin-top:8px;">Se estiver abrindo o arquivo direto do C:\, o navegador pode bloquear o salvamento local em alguns computadores.</div>
    </div>

    <div class="card">
      <h3>Lista de Perguntas</h3>
      <div id="lista"></div>
    </div>
  </div>

  <div id="assistente" class="tab-content">
    <div class="card">
      <h3>Pergunte para LM</h3>
      <input id="perguntaUser" placeholder="Toque aqui e use o microfone do teclado" />
      <button onclick="perguntarLM()">Perguntar</button>
    </div>

    <div class="card">
      <h3>Resposta</h3>
      <div id="respostaLM" class="resposta-box">Aguardando pergunta...</div>
      <button onclick="ouvirResposta()">🔊 Ouvir resposta</button>
    </div>
  </div>
</main>

<script>
  const STORAGE_KEY = 'lm_perguntas_respostas_v2';
  let base = [];
  let editandoIndex = -1;

  function carregarBase() {
    try {
      const dados = localStorage.getItem(STORAGE_KEY);
      if (!dados) {
        base = [];
        return;
      }
      const convertido = JSON.parse(dados);
      base = Array.isArray(convertido) ? convertido : [];
    } catch (erro) {
      base = [];
      definirStatus('Erro ao carregar dados locais: ' + erro.message);
    }
  }

  function salvarBase() {
    try {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(base));
      return true;
    } catch (erro) {
      definirStatus('Não foi possível salvar no navegador. Tente abrir por localhost. Erro: ' + erro.message);
      return false;
    }
  }

  function definirStatus(texto) {
    document.getElementById('statusCadastro').innerText = texto;
  }

  function limparCampos() {
    document.getElementById('pergunta').value = '';
    document.getElementById('resposta').value = '';
    editandoIndex = -1;
    definirStatus('Campos limpos.');
  }

  function salvarItem() {
    const pergunta = document.getElementById('pergunta').value.trim();
    const resposta = document.getElementById('resposta').value.trim();

    if (!pergunta || !resposta) {
      definirStatus('Preencha a pergunta e a resposta.');
      return;
    }

    if (editandoIndex >= 0) {
      base[editandoIndex] = { pergunta, resposta };
    } else {
      base.push({ pergunta, resposta });
    }

    const ok = salvarBase();
    renderLista();

    if (ok) {
      definirStatus(editandoIndex >= 0 ? 'Registro atualizado com sucesso.' : 'Pergunta salva com sucesso.');
      limparCampos();
    }
  }

  function renderLista() {
    const lista = document.getElementById('lista');
    if (!base.length) {
      lista.innerHTML = '<div class="muted">Nenhuma pergunta cadastrada.</div>';
      return;
    }

    lista.innerHTML = '';
    base.forEach((item, index) => {
      const div = document.createElement('div');
      div.className = 'qa-item';
      div.innerHTML = `
        <div class="qa-top">
          <div>
            <div><strong>Pergunta:</strong> ${escapeHtml(item.pergunta)}</div>
            <div style="margin-top:8px;"><strong>Resposta:</strong> ${escapeHtml(item.resposta)}</div>
          </div>
          <div class="qa-actions">
            <button onclick="editarItem(${index})">Editar</button>
            <button class="sec" onclick="excluirItem(${index})">Excluir</button>
          </div>
        </div>
      `;
      lista.appendChild(div);
    });
  }

  function escapeHtml(texto) {
    return String(texto)
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;')
      .replace(/'/g, '&#039;');
  }

  function editarItem(index) {
    const item = base[index];
    if (!item) return;
    document.getElementById('pergunta').value = item.pergunta;
    document.getElementById('resposta').value = item.resposta;
    editandoIndex = index;
    definirStatus('Editando registro selecionado.');
    ativarAba('cadastro');
  }

  function excluirItem(index) {
    if (!confirm('Deseja excluir este registro?')) return;
    base.splice(index, 1);
    const ok = salvarBase();
    renderLista();
    if (ok) definirStatus('Registro excluído com sucesso.');
  }

  function normalizar(texto) {
    return String(texto || '')
      .toLowerCase()
      .normalize('NFD')
      .replace(/[\u0300-\u036f]/g, '')
      .replace(/[^a-z0-9\s]/g, ' ')
      .replace(/\s+/g, ' ')
      .trim();
  }

  function pontuacao(textoUsuario, textoBase) {
    const a = normalizar(textoUsuario);
    const b = normalizar(textoBase);
    if (!a || !b) return 0;
    if (a === b) return 100;
    if (a.includes(b) || b.includes(a)) return 90;

    const pa = a.split(' ');
    const pb = b.split(' ');
    let iguais = 0;
    pa.forEach(p => { if (pb.includes(p)) iguais++; });
    return Math.round((iguais / Math.max(pa.length, pb.length, 1)) * 100);
  }

  function perguntarLM() {
    const texto = document.getElementById('perguntaUser').value.trim();
    const respostaEl = document.getElementById('respostaLM');

    if (!texto) {
      respostaEl.innerText = 'Digite uma pergunta.';
      return;
    }

    let melhor = null;
    let melhorScore = 0;

    base.forEach(item => {
      const score = pontuacao(texto, item.pergunta);
      if (score > melhorScore) {
        melhorScore = score;
        melhor = item;
      }
    });

    if (melhor && melhorScore >= 40) {
      respostaEl.innerText = melhor.resposta;
    } else {
      respostaEl.innerText = 'Não encontrei resposta para esta pergunta.';
    }
  }

  function ouvirResposta() {
    const texto = document.getElementById('respostaLM').innerText.trim();
    if (!texto) return;

    if (!('speechSynthesis' in window)) {
      alert('Este navegador não suporta reprodução de voz.');
      return;
    }

    window.speechSynthesis.cancel();
    const msg = new SpeechSynthesisUtterance(texto);
    msg.lang = 'pt-BR';
    window.speechSynthesis.speak(msg);
  }

  function exportarJSON() {
    const blob = new Blob([JSON.stringify(base, null, 2)], { type: 'application/json' });
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = 'lm_base.json';
    a.click();
    URL.revokeObjectURL(a.href);
    definirStatus('JSON exportado com sucesso.');
  }

  document.getElementById('importar').addEventListener('change', (e) => {
    const file = e.target.files[0];
    if (!file) return;

    const reader = new FileReader();
    reader.onload = () => {
      try {
        const dados = JSON.parse(reader.result);
        if (!Array.isArray(dados)) throw new Error('Arquivo fora do padrão.');
        base = dados.map(item => ({
          pergunta: item.pergunta || item.p || '',
          resposta: item.resposta || item.r || ''
        })).filter(item => item.pergunta && item.resposta);
        salvarBase();
        renderLista();
        definirStatus('JSON importado com sucesso.');
      } catch (erro) {
        definirStatus('Erro ao importar JSON: ' + erro.message);
      }
      e.target.value = '';
    };
    reader.readAsText(file);
  });

  function ativarAba(id) {
    document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
    document.querySelectorAll('.tab-content').forEach(tab => tab.classList.remove('active'));
    document.querySelector(`.tab-btn[data-tab="${id}"]`).classList.add('active');
    document.getElementById(id).classList.add('active');
  }

  document.querySelectorAll('.tab-btn').forEach(btn => {
    btn.addEventListener('click', () => ativarAba(btn.dataset.tab));
  });

  carregarBase();
  renderLista();
</script>

</body>
</html>
